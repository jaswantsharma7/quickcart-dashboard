<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>QuickCart Jaswant</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <nav class="navbar navbar-dark bg-dark mb-4">
        <div class="container">
            <span class="navbar-brand">QuickCart Jaswant</span>
            <span class="text-white">Cart: <span id="cartCountJas">0</span></span>
        </div>
    </nav>

    <div class="container">
        <div class="row g-3 mb-4">
            <div class="col-md-4">
                <input type="text" id="searchInputJas" class="form-control" placeholder="Search products...">
            </div>
            <div class="col-md-4">
                <select id="categoryFilterJas" class="form-select">
                    <option value="all">All Categories</option>
                </select>
            </div>
            <div class="col-md-4">
                <select id="sortPriceJas" class="form-select">
                    <option value="none">Sort by Price</option>
                    <option value="low">Low to High</option>
                    <option value="high">High to Low</option>
                </select>
            </div>
        </div>

        <div id="loaderJas" class="text-center">
            <p>Loading products...</p>
        </div>
        <div id="errorMsgJas" class="alert alert-danger d-none">Failed to load data.</div>

        <div id="productGridJas" class="row row-cols-1 row-cols-md-3 g-4"></div>
    </div>

    <div class="modal fade" id="detailModalJas" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content" id="modalBodyJas"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>

</html>
